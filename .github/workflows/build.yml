name: build

# Builds the hermes-agent-panda image and pushes it to GHCR.
#
# There is no published upstream Hermes Agent image, so this builds a vanilla
# base from github.com/NousResearch/hermes-agent (HERMES_REF) into a local
# `hermes-agent-base:<tag>`, then builds the panda overlay (this repo's
# Dockerfile) FROM it. No external base registry — zero lab dependency.
#
# Output: ghcr.io/ethpandaops/hermes-agent-panda:<base_tag>-<sha>  (+ :latest)

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - entrypoint.sh
      - skills/**
      - .github/workflows/build.yml
  workflow_dispatch:
    inputs:
      hermes_ref:
        description: 'NousResearch/hermes-agent git ref to build the base from'
        required: true
        default: 'v2026.6.5'
      base_tag:
        description: 'Base/overlay version tag (no "v" prefix)'
        required: true
        default: '2026.6.5'
      panda_version:
        description: 'panda CLI + panda-server release version'
        required: true
        default: '0.31.0'

env:
  IMAGE: ghcr.io/ethpandaops/hermes-agent-panda
  HERMES_REF: ${{ github.event.inputs.hermes_ref || 'v2026.6.5' }}
  BASE_TAG: ${{ github.event.inputs.base_tag || '2026.6.5' }}
  PANDA_VERSION: ${{ github.event.inputs.panda_version || '0.31.0' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build vanilla Hermes base from upstream source
        run: |
          git clone --depth 1 --branch "${HERMES_REF}" \
            https://github.com/NousResearch/hermes-agent.git hermes-agent
          git -C hermes-agent log -1 --format='base: %H %s'
          docker build -t "hermes-agent-base:${BASE_TAG}" ./hermes-agent

      - name: Build + push panda overlay
        run: |
          TAG="${BASE_TAG}-${GITHUB_SHA::7}"
          docker build \
            --build-arg BASE_IMAGE=hermes-agent-base \
            --build-arg BASE_TAG="${BASE_TAG}" \
            --build-arg PANDA_VERSION="${PANDA_VERSION}" \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"
          echo "Pushed ${IMAGE}:${TAG} (+ :latest)"
